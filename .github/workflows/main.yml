name: main

on:
  push:
    branches:
      - 'main'

env:
  MRJ_VERSION: v0.5.0

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mrj: ${{ steps.filter.outputs.mrj }}
      renovate-presets: ${{ steps.filter.outputs.renovate-presets }}
      renovate-runner: ${{ steps.filter.outputs.renovate-runner }}
      sh: ${{ steps.filter.outputs.sh }}
      workflows: ${{ steps.filter.outputs.workflows }}
      yml: ${{ steps.filter.outputs.yml }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mrj:
              - "mrj.toml"
              - ".github/workflows/main.yml"
            renovate-presets:
              - "renovate/presets/**"
              - ".github/workflows/main.yml"
            renovate-runner:
              - "renovate/runner/**"
              - ".github/workflows/main.yml"
            sh:
              - "**/*.sh"
              - ".github/workflows/main.yml"
            workflows:
              - ".github/workflows/**.yml"
            yml:
              - "**.yml"
              - "**.yaml"

  validate:
    needs: changes
    if: ${{ needs.changes.outputs.mrj == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install mrj
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: dhth/mrj
          tag: ${{ env.MRJ_VERSION }}
      - uses: actions/checkout@v6
      - name: Validate
        run: |
          mrj config validate

  renovate-presets-checks:
    needs: changes
    if: ${{ needs.changes.outputs.renovate-presets == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate renovate presets
        run: |
          for file in renovate/presets/*.json; do
            jq empty "$file" >/dev/null || {
              printf 'invalid preset: %s\n' "$file"
              exit 1
            }
          done

  renovate-runner-checks:
    needs: changes
    if: ${{ needs.changes.outputs.renovate-runner == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm --prefix renovate/runner ci
      - name: Typecheck
        run: npm --prefix renovate/runner run typecheck
      - name: Run CI checks
        run: npm --prefix renovate/runner run ci

  lint-yaml:
    needs: changes
    if: ${{ needs.changes.outputs.yml == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: dhth/composite-actions/.github/actions/lint-yaml@main

  lint-workflows:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: dhth/composite-actions/.github/actions/lint-actions@main

  lint-sh:
    needs: changes
    if: ${{ needs.changes.outputs.sh == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: dhth/composite-actions/.github/actions/lint-sh@main
